<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/vite.svg" />
  <link rel="stylesheet" href="/src/style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

<body class="bg-gray-900 min-h-screen relative overflow-hidden">
  <div class="fixed inset-0 -z-10 psychedelic-bg"></div>
  <h1 class="jaro-font text-center text-6xl text-white">Pocket Valen</h1>
  <main class="max-w-200 h-fit mx-auto mt-8">
