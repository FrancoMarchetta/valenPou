<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/vite.svg" />
  <link rel="stylesheet" href="/src/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Caveat+Brush&family=Jaro:opsz@6..72&display=swap"
    rel="stylesheet">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title class="">valenpou</title>
</head>

<body class="bg-gray-900 min-h-screen relative overflow-hidden">
  <div class="fixed inset-0 -z-10 psychedelic-bg"></div>
  <h1 class="jaro-font text-center text-6xl text-white">Pocket Valen</h1>
  <main class="max-w-200 h-fit mx-auto  mt-8">

    <!-- valen sprites -->
    <section class=" border-20 border-yellow-400 justify-center flex">
      <img id="sprite" class="w-120" src="" alt="">
    </section>

    <!-- stats -->
    <section class="text-white text-3xl justify-center gap-6 grid">
      <div class="flex gap-3">
        <h1>Hambre🍔</h1>
        <meter id="hungerMetter" min="0" max="100" low="30" high="70" optimum="10" value="20">
        </meter>
      </div>
      <div class="flex gap-3">
        <h1>sueño💤</h1>
        <meter id="sleepMetter" min="0" max="100" low="30" high="70" optimum="10" value=""></meter>
      </div>
      <div class="flex gap-3">
        <h1>diarrea💩</h1>
        <meter id="shitMetter" min="0" max="100" low="30" high="70" optimum="10" value=""></meter>
      </div>
      <div class="flex gap-3">
        <h1>Deuda💲</h1>
        <meter id="debtMetter" min="0" max="100" low="30" high="70" optimum="10" value=""></meter>
      </div>
      <div class="flex gap-3">
        <h1>Curvatura espinal🧑‍🦼‍➡️</h1>
        <meter id="crippleMetter" min="0" max="100" low="30" high="70" optimum="10" value=""></meter>
      </div>

    </section>
  </main>

  <script type="module" src="/src/main.ts"></script>
</body>

</html>
