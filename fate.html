<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <link rel="stylesheet" href="/src/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Caveat+Brush&family=Jaro:opsz@6..72&display=swap"

<body class="bg-gray-900 min-h-screen relative overflow-hidden">
    <div class="fixed inset-0 -z-10 psychedelic-bg"></div>
    <main class="max-w-20 h-fit mx-auto mt-8">
        <!-- valen sprites -->
        <section class="

        <div class="mt-8">

                <div

        </div>
